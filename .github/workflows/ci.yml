name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    env:
      TELEMETRY_DISABLED: 1
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      AUTH_ADMIN_PASSWORD: ${{ secrets.AUTH_ADMIN_PASSWORD }}
      SITE_URL: ${{ secrets.SITE_URL }}
      STORAGE_URL: ${{ secrets.STORAGE_URL }}
      STORAGE_KEY: ${{ secrets.STORAGE_KEY }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_MODEL: ${{ secrets.AI_MODEL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Lint & Type Check
        run: npm run test

      - name: Build Application
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Step
        run: |
          echo "Ready for deployment."
          # To deploy to Vercel, uncomment the following lines and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to your GitHub Secrets.
          # npm install --global vercel
          # vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --prod
